<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nick's Robot Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="paw-print">🐾</div>
    <h1>Nick's Robot Buddy</h1>
    <div class="paw-print">🐾</div>
  </header>

  <main id="app">

    <section id="view-picker" class="view active">
      <div class="buddy-stage small-stage">
        <div id="buddy-picker"></div>
      </div>
      <h2 class="prompt">Hi Nick! What do you wanna do?</h2>
      <div class="skill-buttons">
        <button class="skill-btn" data-skill="chat">
          <span class="skill-icon">🦴</span>
          <span class="skill-label">Talk to Buddy</span>
        </button>
        <button class="skill-btn" data-skill="robot">
          <span class="skill-icon">🤖</span>
          <span class="skill-label">Drive the Robot</span>
        </button>
      </div>
    </section>

    <section id="view-chat" class="view">
      <button class="back-btn">← Back</button>
      <div class="buddy-stage">
        <div id="buddy-chat"></div>
      </div>
      <div id="chat-log" class="chat-log"></div>
      <div class="input-bar">
        <button id="chat-mic" class="mic-btn" title="Hold to talk">🎤</button>
        <input id="chat-text" type="text" placeholder="Type to Buddy or hold the mic..." autocomplete="off">
        <button id="chat-send" class="send-btn">Send</button>
      </div>
      <div id="chat-status" class="status-line"></div>
    </section>

    <section id="view-robot" class="view">
      <button class="back-btn">← Back</button>
      <div class="buddy-stage small-stage">
        <div id="buddy-robot"></div>
      </div>
      <div class="robot-panel">
        <div id="robot-connection" class="connection-row">
          <span id="robot-status-dot" class="status-dot disconnected"></span>
          <span id="robot-status-text">Robot not connected</span>
          <select id="robot-port-select"></select>
          <button id="robot-connect-btn" class="small-btn">Connect</button>
          <button id="robot-refresh-btn" class="small-btn" title="Refresh ports">↻</button>
        </div>
        <p class="hint">Tip: pair the mBot in Windows Bluetooth settings first, then pick its COM port.</p>
        <div class="input-bar">
          <button id="robot-mic" class="mic-btn" title="Hold to talk">🎤</button>
          <input id="robot-text" type="text" placeholder='Try: "Go forward 3 seconds and turn right"' autocomplete="off">
          <button id="robot-send" class="send-btn">Go!</button>
        </div>
        <button id="robot-stop" class="stop-btn">🛑 STOP!</button>
        <div id="robot-narration" class="narration"></div>
        <div id="robot-log" class="action-log"></div>
      </div>
    </section>

  </main>

  <template id="buddy-template">
    <svg class="buddy-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

      <!-- Tail: drawn FIRST so it sits behind the body. Curls up-right behind. -->
      <g class="tail-group">
        <path class="tail-outer"
              d="M 318 358 Q 365 340 385 290 Q 400 240 380 215 Q 360 225 358 270 Q 345 320 318 350 Z"
              fill="#C68A38" stroke="#8B5E2A" stroke-width="3"/>
        <path class="tail-inner"
              d="M 328 350 Q 360 335 372 295 Q 380 255 372 235 Q 365 245 365 275 Q 358 310 332 340 Z"
              fill="#E0A85A" opacity="0.6"/>
      </g>

      <!-- Body / chest behind the head -->
      <ellipse cx="200" cy="380" rx="160" ry="55" fill="#E5A560" stroke="#8B5E2A" stroke-width="3"/>

      <!-- Floppy ears: path-based hanging shapes. Drawn BEFORE head so the head's
           outline edges over them slightly for visual continuity. -->
      <g class="ear ear-left">
        <path class="ear-outer"
              d="M 100 110 Q 30 128 25 220 Q 25 318 78 338 Q 130 318 135 230 Q 135 128 100 110 Z"
              fill="#8B5E2A" stroke="#5C3D1A" stroke-width="3"/>
        <path class="ear-inner"
              d="M 100 132 Q 55 150 50 225 Q 50 305 82 320 Q 120 305 125 232 Q 125 148 100 132 Z"
              fill="#E0A85A"/>
      </g>
      <g class="ear ear-right">
        <path class="ear-outer"
              d="M 300 110 Q 370 128 375 220 Q 375 318 322 338 Q 270 318 265 230 Q 265 128 300 110 Z"
              fill="#8B5E2A" stroke="#5C3D1A" stroke-width="3"/>
        <path class="ear-inner"
              d="M 300 132 Q 345 150 350 225 Q 350 305 318 320 Q 280 305 275 232 Q 275 148 300 132 Z"
              fill="#E0A85A"/>
      </g>

      <!-- Head -->
      <ellipse cx="200" cy="200" rx="135" ry="125"
               fill="#E5A560" stroke="#8B5E2A" stroke-width="4"/>

      <!-- Cheek/forehead light patch -->
      <ellipse cx="200" cy="180" rx="105" ry="75" fill="#F5C871" opacity="0.6"/>

      <!-- Snout -->
      <ellipse cx="200" cy="265" rx="80" ry="55"
               fill="#FAE8C2" stroke="#C68A38" stroke-width="3"/>

      <!-- Eyes -->
      <g class="eye eye-left">
        <ellipse cx="150" cy="195" rx="20" ry="24" fill="#1a1a1a"/>
        <circle cx="156" cy="188" r="7" fill="#fff"/>
        <circle cx="146" cy="203" r="3" fill="#fff" opacity="0.8"/>
      </g>
      <g class="eye eye-right">
        <ellipse cx="250" cy="195" rx="20" ry="24" fill="#1a1a1a"/>
        <circle cx="256" cy="188" r="7" fill="#fff"/>
        <circle cx="246" cy="203" r="3" fill="#fff" opacity="0.8"/>
      </g>

      <!-- Nose -->
      <ellipse cx="200" cy="240" rx="20" ry="15" fill="#1a1a1a"/>
      <ellipse cx="194" cy="235" rx="6" ry="3" fill="#fff" opacity="0.6"/>

      <!-- Mouth: smile when closed, opens with tongue showing -->
      <g class="mouth-group">
        <path class="mouth-path"
              d="M 170 280 Q 185 295 200 290 Q 215 295 230 280"
              fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
        <path class="mouth-tongue"
              d="M 178 290 Q 200 315 222 290 Q 215 308 200 310 Q 185 308 178 290 Z"
              fill="#E66D7A" stroke="#A8485A" stroke-width="1.5" opacity="0"/>
      </g>

      <!-- Collar -->
      <g class="collar">
        <rect x="105" y="335" width="190" height="24" rx="12"
              fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
        <circle cx="200" cy="365" r="15" fill="#FBBF24" stroke="#B45309" stroke-width="2"/>
        <text x="200" y="371" text-anchor="middle"
              font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#7C2D12">B</text>
      </g>
    </svg>
  </template>

  <script src="app.js"></script>
</body>
</html>
